    /* ── Cover ── */
    .cover {
      --c-bg: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 50%, #2563eb 100%);
      --c-glow1: rgba(96, 165, 250, 0.2);

      --c-title: #ffffff;
      --c-subtitle: rgba(191, 219, 254, 0.85);

      --c-meta-line: rgba(191, 219, 254, 0.5);
      --c-accent: #60a5fa;
      --c-font: 'Noto Serif SC', serif;

      position: relative;
      width: 100%;
      background: var(--c-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      container-type: inline-size;
      border-radius: 4px;
      aspect-ratio: 1200 / 480;
      font-family: var(--c-font);
    }

    .cover::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60cqi 80cqi at 15% 50%, var(--c-glow1) 0%, transparent 70%),
        radial-gradient(ellipse 40cqi 60cqi at 85% 30%, var(--c-glow2) 0%, transparent 70%);

    /* ── Decoration elements ── */
    .deco-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .deco-grid.classic {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),

    .deco-grid.cyberpunk {
      background-image:
        linear-gradient(rgba(239, 68, 68, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(239, 68, 68, 0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .deco-grid.sphere {
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);

    .deco-scan {

      inset: 0;
      background: linear-gradient(to bottom, transparent 0%, rgba(239, 68, 68, 0.04) 50%, transparent 100%);
      background-size: 100% 8px;
      animation: scan 8s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {

      100% {

    .deco-hud {
      position: absolute;
      width: 3cqi;
      height: 3cqi;

    .deco-hud::before,
    .deco-hud::after {
      content: '';
      position: absolute;
      background: var(--c-accent);
      opacity: 0.6;
    }

    .deco-hud::before {
      width: 100%;
      height: 1.5px;
      top: 0;
      left: 0;
    }

    .deco-hud::after {
      width: 1.5px;
      height: 100%;
      top: 0;
      left: 0;

    .deco-hud-tl {
      top: 2cqi;
      left: 2cqi;

    .deco-hud-tr {

      top: 50%;
      transform: translateY(-50%);
      width: 25cqi;
      height: 25cqi;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      box-shadow: inset 0 0 20px var(--c-glow1), 0 0 30px var(--c-glow2);
      animation: spherePulse 10s infinite alternate;
    }

    .deco-ai-sphere::after {
      content: '';
      position: absolute;
      inset: 3cqi;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: radial-gradient(circle, var(--c-blob) 0%, transparent 70%);
    }

    @keyframes spherePulse {
      0% {
        transform: translateY(-50%) scale(1);
      }

      100% {
        transform: translateY(-50%) scale(1.05);
      }
    }

    .deco-circuit {
      position: absolute;
      right: 5cqi;
      bottom: 5cqi;
      display: flex;
      gap: 1.2cqi;
      align-items: flex-end;
    }

    .deco-circuit span {
      display: block;
      width: 0.6cqi;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .deco-dots-sp {
      position: absolute;
      right: 6.5cqi;
      top: 8cqi;
      display: grid;
      grid-template-columns: repeat(4, 0.3cqi);
      gap: 0.8cqi;
    }

    .deco-dots-sp span {
      display: block;
      width: 0.3cqi;
      height: 0.3cqi;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
    }

    /* ── Minimal (简约风): centered text, ambient glow kept ── */
    .cover.deco-minimal .cover-content {
      text-align: center;
      padding-left: 8cqi;
      padding-right: 8cqi;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Cover content ── */
    .cover-content {
      position: relative;
      z-index: 1;
      padding-left: 10cqi;
      padding-right: 6.5cqi;
      width: 100%;
    }

    .cover .label {
      display: inline-block;
      font-size: 2cqi;
      letter-spacing: 0.2em;
      color: var(--c-label);
      margin-bottom: 1.6cqi;
      font-family: var(--c-font);
      background: rgba(255, 255, 255, 0.1);
      padding: 0.35cqi 1cqi;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .cover h1 {
      font-size: 5cqi;
      font-weight: 900;
      color: var(--c-title);
      line-height: 1.5;
      margin-bottom: 1.6cqi;
      letter-spacing: -0.01em;
      max-width: 70cqi;
    }

    .cover .subtitle {
      font-size: 2cqi;
      color: var(--c-subtitle);
      line-height: 1.6;
      max-width: 70cqi;
      font-weight: 400;
    }

    .cover .meta {
      position: absolute;
      bottom: 1.2cqi;
      right: 1.5cqi;
      display: flex;
      align-items: center;
      gap: 1cqi;
      font-size: var(--meta-fs, 1.5cqi);
      color: var(--c-meta);
      letter-spacing: 0.05em;
      z-index: 1;
    }

    .cover .meta::before,
    .cover .meta::after {
      content: '';
      width: 3cqi;
      height: 1px;
    }

    .cover .meta::before {
      background: linear-gradient(to right, transparent, var(--c-meta-line));
    }

    .cover .meta::after {
      background: linear-gradient(to left, transparent, var(--c-meta-line));
    }

    /* Cyberpunk overrides */
    .cover.deco-cyberpunk .label {
      display: inline-flex;
      align-items: center;
      gap: 0.6cqi;
      font-size: 1.7cqi;
      letter-spacing: 0.25em;
      background: rgba(220, 38, 38, 0.12);
      border-radius: 4px;
      border-color: rgba(239, 68, 68, 0.25);
    }

    .cover.deco-cyberpunk .label::before {
      content: '▶';
      font-size: 1.2cqi;
      color: var(--c-accent);
      opacity: 0.8;
    }

    .cover.deco-cyberpunk .meta {
      font-size: 1.4cqi;
      bottom: 2.8cqi;
      right: 3cqi;
    }

    .cover.deco-cyberpunk h1 {
      text-shadow: 0 0 40px rgba(239, 68, 68, 0.15);
    }

    /* Sphere overrides */
    .cover.deco-sphere .label {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 15px var(--c-glow1);
      backdrop-filter: blur(4px);
    }

    .cover.deco-sphere h1 {
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 0 40px var(--c-glow1);
    }

    /* ── Presets strip (inside center, below cover) ── */
    .presets-strip {
      flex: none;
      padding: 10px 20px 12px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
    }

    .presets-label {
      font-size: 9px;
      font-weight: 700;
      color: #b0b8c4;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: sans-serif;
      margin-bottom: 8px;
    }

    .presets-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      scrollbar-color: #e5e7eb transparent;
    }

    .presets-list::-webkit-scrollbar {
      height: 3px;
    }

    .presets-list::-webkit-scrollbar-thumb {
      background: #e5e7eb;
      border-radius: 2px;
    }

    .preset-card {
      flex: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 6px;
      border: 1.5px solid #e5e7eb;
      border-radius: 7px;
      background: #f9fafb;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      width: 116px;
    }

    .preset-card:hover {
      border-color: #93c5fd;
      background: #f0f7ff;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .preset-card.active {
      border-color: #2563eb;
      background: #eff6ff;
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }

    .preset-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 5 / 2;
      border-radius: 3px;
      overflow: hidden;
    }

    .thumb-line {
      position: absolute;
      left: 10%;
      top: 15%;
      width: 2px;
      height: 70%;
      background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.65), transparent);
      border-radius: 1px;
    }

    .thumb-circle {
      position: absolute;
      right: -5%;
      top: -20%;
      width: 42%;
      height: 140%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .thumb-hud {
      position: absolute;
      width: 18%;
      height: 55%;
      border-top: 1.5px solid currentColor;
      border-left: 1.5px solid currentColor;
      opacity: 0.75;
    }

    .thumb-hud.tl {
      top: 8%;
      left: 8%;
    }

    .thumb-hud.br {
      bottom: 8%;
      right: 8%;
      transform: rotate(180deg);
    }

    .thumb-scan {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(to bottom, transparent, transparent 3px, rgba(255, 255, 255, 0.04) 3px, rgba(255, 255, 255, 0.04) 4px);
    }

    .thumb-sphere {
      position: absolute;
      right: 8%;
      top: 50%;
      transform: translateY(-50%);
      width: 36%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px dashed rgba(255, 255, 255, 0.28);
    }

    .preset-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .preset-name {
      font-size: 11px;
      font-weight: 600;
      color: #111;
      font-family: sans-serif;
      line-height: 1.2;
    }

    .preset-tags {
      font-size: 9px;
      color: #9ca3af;
      font-family: sans-serif;
    }

    .preset-card.active .preset-name {
      color: #1d4ed8;
    }

    .preset-card.active .preset-tags {
      color: #60a5fa;
    }

    /* ── Source image panel ── */
    .source-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .source-thumb-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 4px;
      border: 1.5px solid #e5e7eb;
      border-radius: 6px;
      background: #f9fafb;
      cursor: pointer;
      transition: all 0.15s;
      overflow: hidden;
    }

    .source-thumb-btn:hover {
      border-color: #93c5fd;
      background: #eff6ff;
    }

    .source-thumb-btn.active {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .source-thumb-btn img {
      width: 100%;
      aspect-ratio: 5 / 2;
      object-fit: cover;
      border-radius: 3px;
    }

    .source-thumb-btn span {
      font-size: 9px;
      font-family: sans-serif;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .source-thumb-btn.active span {
      color: #1d4ed8;
    }

    .source-upload-btn {
      border-style: dashed;
      min-height: 52px;
      justify-content: center;
    }

    .source-upload-btn .upload-icon {
      font-size: 18px;
      color: #9ca3af;
      line-height: 1;
    }

    /* ── Cover image element ── */
    .cover-img {
      position: absolute;
      right: 0cqi;
      top: 50%;
      transform: translateY(-50%);
      height: 25cqi;
      width: auto;
      object-fit: contain;
      z-index: 2;
      pointer-events: none;
    }

    /* ════════════════════════════════════════════════════════════
       AINoSleep 深色科技风覆盖（与 ainosleep-tools-site 同源配色）
       --bg:#0f1115  --bg2:#161922  --card:#1a1e28  --border:#2a2f3a
       --text:#e6e9ef  --muted:#8b93a5  --accent:#4f8cff
       ════════════════════════════════════════════════════════════ */
    :root {
      --dk-bg: #0f1115;
      --dk-bg2: #161922;
      --dk-card: #1a1e28;
      --dk-card-hover: #20252f;
      --dk-border: #2a2f3a;
      --dk-text: #e6e9ef;
      --dk-muted: #8b93a5;
      --dk-accent: #4f8cff;
      --dk-accent-glow: rgba(79, 140, 255, .25);
    }

    body {
      background: var(--dk-bg);
    }

    .app-header {
      background: var(--dk-bg2);
      border-bottom: 1px solid var(--dk-border);
    }

    .home-link { color: var(--dk-muted); }
    .home-link:hover { background: var(--dk-card); color: var(--dk-text); }
    .header-logo { color: var(--dk-text); }
    .header-ratio { background: var(--dk-card); color: var(--dk-muted); }

    .btn {
      background: var(--dk-card);
      border-color: var(--dk-border);
      color: var(--dk-text);
    }
    .btn:hover { background: var(--dk-card-hover); border-color: #3a4150; }
    .btn-primary { background: var(--dk-accent); border-color: var(--dk-accent); color: #fff; }
    .btn-primary:hover { background: #3d7bf0; border-color: #3d7bf0; }

    .panel {
      background: var(--dk-bg2) !important;
      border-color: var(--dk-border) !important;
    }
    .panel-left { border-right: 1px solid var(--dk-border); }
    .panel-right { border-left: 1px solid var(--dk-border); }

    .psec { border-bottom: 1px solid var(--dk-border); }
    .psec-title { color: var(--dk-muted); }

    .field label { color: var(--dk-muted); }

    .panel input[type="text"],
    .panel textarea,
    .panel select {
      background: var(--dk-card);
      border: 1px solid var(--dk-border);
      color: var(--dk-text);
    }
    .panel input[type="text"]:focus,
    .panel textarea:focus,
    .panel select:focus,
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      border-color: var(--dk-accent);
      outline: none;
      background: var(--dk-card) !important;
      color: var(--dk-text) !important;
      box-shadow: 0 0 0 3px var(--dk-accent-glow);
    }

    /* 原生下拉菜单跟随深色（字体选择那种 select） */
    :root { color-scheme: dark; }
    .panel select option,
    .field select option {
      background: var(--dk-card);
      color: var(--dk-text);
    }
    .panel input::placeholder,
    .panel textarea::placeholder { color: #5a6275; }

    .panel input[type="range"] { accent-color: var(--dk-accent); }
    .slider-val { color: var(--dk-muted); }

    .vis-toggle {
      background: var(--dk-card);
      border-color: var(--dk-border);
      color: var(--dk-muted);
    }
    .vis-toggle.on {
      background: rgba(79, 140, 255, .15);
      border-color: var(--dk-accent);
      color: #7ea6ff;
    }

    .color-mode-label { color: var(--dk-muted); }

    .deco-btn {
      background: var(--dk-card);
      border-color: var(--dk-border);
      color: var(--dk-text);
    }
    .deco-btn:hover { background: var(--dk-card-hover); border-color: #3a4150; }
    .deco-btn.active {
      background: rgba(79, 140, 255, .12);
      border-color: var(--dk-accent);
      color: #7ea6ff;
    }

    .ratio-btn {
      background: var(--dk-card);
      border-color: var(--dk-border);
    }
    .ratio-btn:hover { background: var(--dk-card-hover); border-color: #3a4150; }
    .ratio-btn.active {
      background: rgba(79, 140, 255, .12);
      border-color: var(--dk-accent);
    }
    .ratio-icon { border-color: var(--dk-muted) !important; }
    .ratio-btn.active .ratio-icon { border-color: var(--dk-accent) !important; }
    .ratio-btn span { color: var(--dk-muted); }
    .ratio-btn.active span { color: #7ea6ff; }

    .preview-area {
      background:
        radial-gradient(ellipse 50% 40% at 50% 0%, var(--dk-accent-glow), transparent 70%),
        var(--dk-bg);
    }

    .presets-strip {
      background: var(--dk-bg2);
      border-top: 1px solid var(--dk-border);
    }
    .presets-label { color: var(--dk-muted); }

    .preset-card {
      background: var(--dk-card);
      border-color: var(--dk-border);
    }
    .preset-card:hover {
      background: var(--dk-card-hover);
      border-color: #3a4150;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, .35);
    }
    .preset-card.active {
      border-color: var(--dk-accent);
      box-shadow: 0 0 0 1px var(--dk-accent-glow);
    }
    .preset-name { color: var(--dk-text); }
    .preset-tags { color: var(--dk-muted); }
    .preset-card.active .preset-name { color: #7ea6ff; }
    .preset-card.active .preset-tags { color: var(--dk-muted); }

    /* ── 新装饰:立体相框 editorial ──
       圆角细白框留白内嵌 + 框内侧模糊黑晕(内阴影)制造立体感 */
    .deco-ed-frame {
      position: absolute;
      inset: 2.2cqi;
      border: 2px solid var(--c-title);
      border-radius: 4cqi;
      box-shadow:
        inset 0 0 5.5cqi rgba(0, 0, 0, .55),
        0 0 2.5cqi rgba(0, 0, 0, .45);
      opacity: .92;
      pointer-events: none;
    }
    /* 框外四周轻微压暗,留白更有层次 */
    .deco-ed-dim {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 7cqi rgba(0, 0, 0, .5);
      pointer-events: none;
    }
    /* 立体相框下:作者签名挪进框内,置于最上层 */
    .cover.deco-editorial .meta {
      bottom: 4.2cqi;
      right: 5cqi;
      z-index: 3;
    }

    /* ── 新装饰:细线画框 frame ── */
    .deco-frame-box {
      position: absolute;
      inset: 3.5cqi;
      border: 1.5px solid rgba(255, 255, 255, .16);
    }
    .deco-frame-box::after {
      content: '';
      position: absolute;
      inset: .8cqi;
      border: 1px solid rgba(255, 255, 255, .07);
    }
    .deco-frame-c {
      position: absolute;
      width: 3cqi;
      height: 3cqi;
      border-color: var(--c-accent);
      border-style: solid;
      opacity: .9;
    }
    .deco-frame-c.tl { left: 3.5cqi; top: 3.5cqi; border-width: 2.5px 0 0 2.5px; }
    .deco-frame-c.tr { right: 3.5cqi; top: 3.5cqi; border-width: 2.5px 2.5px 0 0; }
    .deco-frame-c.bl { left: 3.5cqi; bottom: 3.5cqi; border-width: 0 0 2.5px 2.5px; }
    .deco-frame-c.br { right: 3.5cqi; bottom: 3.5cqi; border-width: 0 2.5px 2.5px 0; }

    /* 滚动条 */
    .panel-body::-webkit-scrollbar,
    .presets-list::-webkit-scrollbar { width: 8px; height: 8px; }
    .panel-body::-webkit-scrollbar-thumb,
    .presets-list::-webkit-scrollbar-thumb {
      background: var(--dk-border);
      border-radius: 4px;
    }
    .panel-body::-webkit-scrollbar-thumb:hover,
    .presets-list::-webkit-scrollbar-thumb:hover { background: #3a4150; }
  </style>
</head>

<body>

  <!-- ── Header ── -->
  <header class="app-header">
    <a class="home-link" href="index.html" title="工具箱首页">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 6.5L7.5 1.5L13.5 6.5V13.5H9.5V9.5H5.5V13.5H1.5V6.5Z" />
      </svg>
    </a>
    <span class="header-logo">AINoSleep 封面工坊</span>
    <span class="header-ratio" id="ratio-label">5:2 · 2500×1000 · X横版</span>
    <div class="header-spacer"></div>
    <div class="header-actions">
      <button class="btn" onclick="resetAll()">重置</button>
      <button class="btn" id="btn-copy-draft" onclick="copyDraftConfig()">Copy Config</button>
      <button class="btn" id="btn-copy-config" onclick="copyConfig()">Copy 预设</button>
      <button class="btn btn-primary" onclick="exportPng()">下载 PNG</button>
      <button class="btn btn-primary" onclick="copyImage()">复制图片</button>
    </div>
  </header>

  <div class="layout">

    <!-- ── Left panel: content + per-field controls ── -->
    <aside class="panel panel-left">
      <div class="panel-body">

        <!-- Label -->
        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">标签 Label</span>
            <div class="field-actions">
              <button class="vis-toggle on" id="toggle-label" onclick="toggleVis('label')">显示</button>
              <input type="color" class="color-swatch" id="clr-label" value="#93c5fd" title="标签颜色">
            </div>
          </div>
          <div class="field">
            <input id="inp-label" type="text" placeholder="系列标签">
          </div>
          <div class="field">
            <label>字号</label>
            <div class="slider-row">
              <input id="sld-label" type="range" min="0.5" max="4" step="0.1" value="2">
              <span id="val-label" class="slider-val">2 cqi</span>
            </div>
          </div>
        </div>

        <!-- Title -->
        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">标题 Title</span>
            <div class="field-actions">
              <button class="vis-toggle on" id="toggle-title" onclick="toggleVis('title')">显示</button>
              <input type="color" class="color-swatch" id="clr-title" value="#ffffff" title="标题颜色">
            </div>
          </div>
          <div class="field">
            <textarea id="inp-title" class="tall" placeholder="文章标题"></textarea>
          </div>
          <div class="field">
            <label>字号</label>
            <div class="slider-row">
              <input id="sld-title" type="range" min="2" max="9" step="0.1" value="5">
              <span id="val-title" class="slider-val">5 cqi</span>
            </div>
          </div>
          <div class="field">
            <label>行高</label>
            <div class="slider-row">
              <input id="sld-title-lh" type="range" min="1" max="2.5" step="0.05" value="1.5">
              <span id="val-title-lh" class="slider-val">1.5</span>
            </div>
          </div>
          <div class="field">
            <label>上间距</label>
            <div class="slider-row">
              <input id="sld-title-mt" type="range" min="0" max="6" step="0.1" value="0">
              <span id="val-title-mt" class="slider-val">0 cqi</span>
            </div>
          </div>
          <div class="field">
            <label>下间距</label>
            <div class="slider-row">
              <input id="sld-title-mb" type="range" min="0" max="6" step="0.1" value="1.6">
              <span id="val-title-mb" class="slider-val">1.6 cqi</span>
            </div>
          </div>
        </div>

        <!-- Subtitle -->
        <div class="psec">
          <div class="psec-header">
            <span class="psec-title">副标题 Subtitle</span>
            <div class="field-actions">
              <button class="vis-toggle on" id="toggle-subtitle" onclick="toggleVis('subtitle')">显示</button>
              <input type="color" class="color-swatch" id="clr-subtitle" value="#bfdbfe" title="副标题颜色">
            </div>
          </div>
          <div class="field">
            <textarea id="inp-subtitle" placeholder="副标题或摘要"></textarea>
          </div>
          <div class="field">
            <label>字号</label>
            <div class="slider-row">
              <input id="sld-subtitle" type="range" min="1" max="4" step="0.1" value="2">

        card.dataset.preset = i;
        const thumb = document.createElement('div'); thumb.className = 'preset-thumb';
        buildThumb(thumb, p.scheme, p.deco);
        const info = document.createElement('div'); info.className = 'preset-info';
        const name = document.createElement('span'); name.className = 'preset-name'; name.textContent = p.name;
        const tags = document.createElement('span'); tags.className = 'preset-tags';
        tags.textContent = COLOR_SCHEMES[p.scheme].name + ' · ' + DECO_LABELS[p.deco];
        card.title = [p.name, COLOR_SCHEMES[p.scheme].name, DECO_LABELS[p.deco], FONT_OPTIONS[p.font || DEFAULT_FONT].name].join(' · ');
        info.append(name, tags);
        card.append(thumb, info);
        card.addEventListener('click', () => applyPreset(i));
        list.appendChild(card);
      });
    }

    function normalizeHex(hex) {
      return (hex || '').trim().toLowerCase();
    }

    function readNumber(id) {
      return +document.getElementById(id).value;
    }

    function getActiveRatioButton() {
      return document.querySelector('.ratio-btn.active') || document.querySelector('.ratio-btn');
    }

    function getActiveSchemeButton() {
      return document.querySelector('.color-btn.active[data-scheme]');
    }

    function getCurrentBackgroundConfig() {
      const customBtn = document.getElementById('btn-custom-bg');
      if (customBtn.classList.contains('active')) {
        return {
          type: 'custom',
          value: normalizeHex(document.getElementById('inp-custom-bg').value),
        };
      }

      const activeSchemeBtn = getActiveSchemeButton();
      const idx = activeSchemeBtn ? +activeSchemeBtn.dataset.scheme : DEFAULT_SCHEME;
      return {
        type: 'scheme',
        index: idx,
        name: COLOR_SCHEMES[idx].name,
      };
    }

    function getDefaultTextColors(backgroundConfig) {
      if (backgroundConfig.type === 'custom') {
        return {
          label: '#ffffff',
          title: '#ffffff',
          subtitle: '#ffffff',
          meta: '#ffffff',
        };
      }

      const [label, subtitle, meta] = SCHEME_HEX[backgroundConfig.index];
      return {
        label: normalizeHex(label),
        title: '#ffffff',
        subtitle: normalizeHex(subtitle),
        meta: normalizeHex(meta),
      };
    }

    async function writeTextToClipboard(text) {
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
    }

    function buildConfigPayload() {
      const changes = {};
      const ratioBtn = getActiveRatioButton();
      const ratio = ratioBtn?.dataset.ratio || DEFAULT_RATIO;
      const ratioLabel = ratioBtn?.dataset.label || '5:2 · 1200×480';
      const background = getCurrentBackgroundConfig();
      const defaultTextColors = getDefaultTextColors(background);
      const ratioDefaults = RATIO_PRESETS[ratio] || RATIO_PRESETS[DEFAULT_RATIO];

      if (ratio !== DEFAULT_RATIO) {
        changes.ratio = { value: ratio, label: ratioLabel };
      }

      if (background.type === 'custom') {
        changes.background = background;
      } else if (background.index !== DEFAULT_SCHEME) {
        changes.background = background;
      }

      const fontId = getCurrentFontChoice();
      if (fontId !== DEFAULT_FONT && FONT_OPTIONS[fontId]) {
        changes.font = {
          id: fontId,
          name: FONT_OPTIONS[fontId].name,
        };
      }

      if (currentDeco !== DEFAULT_DECO) {
        changes.decoration = currentDeco;
      }

      changes.content = {
        label:    document.getElementById('inp-label').value,
        title:    document.getElementById('inp-title').value,
        subtitle: document.getElementById('inp-subtitle').value,
        author:   document.getElementById('inp-author').value,
      };

      const visibility = {};
      Object.entries(visState).forEach(([field, value]) => {
        if (value !== true) visibility[field] = value;
      });
      if (Object.keys(visibility).length) changes.visibility = visibility;

      const typography = {};
      if (readNumber('sld-label') !== ratioDefaults.labelSize) typography.labelSize = readNumber('sld-label');
      if (readNumber('sld-title') !== ratioDefaults.titleSize) typography.titleSize = readNumber('sld-title');
      if (readNumber('sld-subtitle') !== ratioDefaults.subtitleSize) typography.subtitleSize = readNumber('sld-subtitle');
      if (readNumber('sld-width') !== ratioDefaults.width) typography.contentWidth = readNumber('sld-width');
      if (readNumber('sld-title-lh') !== ratioDefaults.titleLH) typography.titleLineHeight = readNumber('sld-title-lh');
      if (readNumber('sld-subtitle-lh') !== ratioDefaults.subtitleLH) typography.subtitleLineHeight = readNumber('sld-subtitle-lh');
      if (readNumber('sld-title-mt') !== ratioDefaults.titleMT) typography.titleMarginTop = readNumber('sld-title-mt');
      if (readNumber('sld-title-mb') !== ratioDefaults.titleMB) typography.titleMarginBottom = readNumber('sld-title-mb');
      if (Object.keys(typography).length) changes.typography = typography;

      const textColors = {};
      const currentColors = {
        label: normalizeHex(document.getElementById('clr-label').value),
        title: normalizeHex(document.getElementById('clr-title').value),
        subtitle: normalizeHex(document.getElementById('clr-subtitle').value),
        meta: normalizeHex(document.getElementById('clr-meta').value),
      };

      Object.entries(currentColors).forEach(([key, value]) => {
        if (value !== defaultTextColors[key]) textColors[key] = value;
      });
      if (Object.keys(textColors).length) changes.textColors = textColors;

      if (coverImgState.path) {
        changes.image = {
          path: coverImgState.path,
          size: coverImgState.size,
          right: coverImgState.right,
          visible: coverImgState.visible,
        };
      }

      return {
        tool: 'cover.html',
        note: '请按以下配置新建一个快捷预设。未列出的字段保持默认。',
        changes,
      };
    }

    async function copyDraftConfig() {
      const { changes } = buildConfigPayload();
      const text = '```json\n"changes": ' + JSON.stringify(changes, null, 2) + '\n```';
      try {
        await writeTextToClipboard(text);
        const btn = document.getElementById('btn-copy-draft');
        const prev = btn.textContent;
        btn.textContent = '已复制';
        setTimeout(() => { btn.textContent = prev; }, 1200);
      } catch (err) {
        alert('复制失败：' + err);
      }
    }

    async function copyConfig() {
      const payload = buildConfigPayload();
      const text = [
        '请按以下配置为 cover.html 新建一个快捷预设。未列出的字段保持默认。',
        '```json',
        JSON.stringify(payload, null, 2),
        '```'
      ].join('\n');

      try {
        await writeTextToClipboard(text);
        const btn = document.getElementById('btn-copy-config');
        const prev = btn.textContent;
        btn.textContent = '已复制';
        setTimeout(() => { btn.textContent = prev; }, 1200);
      } catch (err) {
        alert('复制配置失败：' + err);
      }
    }

    // ── Reset ──────────────────────────────────────────────────────────────
    function resetAll() {
      document.getElementById('inp-label').value = DEFAULT.label;
      document.getElementById('inp-title').value = DEFAULT.title;
      document.getElementById('inp-subtitle').value = DEFAULT.subtitle;
      document.getElementById('inp-author').value = DEFAULT.author;
      syncContent();
      document.querySelectorAll('.ratio-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
      document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('active', +b.dataset.scheme === 6));
      document.querySelectorAll('.deco-btn').forEach((b, i) => b.classList.toggle('active', i === 0));
      document.querySelectorAll('.preset-card').forEach((c, i) => c.classList.toggle('active', i === 0));
      const cover = document.getElementById('cover-main');
      cover.style.aspectRatio = '1200/480';
      cover.style.maxWidth = '';
      cover.style.setProperty('--meta-fs', '1.5cqi');
      document.getElementById('ratio-label').textContent = '5:2 · 2500×1000 · X横版';
      applyColorScheme(6);
      const customLbl = document.getElementById('btn-custom-bg');
      customLbl.style.background = '';
      customLbl.classList.remove('has-custom');
      document.getElementById('inp-custom-bg').value = '#1d4ed8';
      currentDeco = 'classic';
      buildDecorations('classic');
      const defaultPresetFont = PRESETS[0]?.font || DEFAULT_FONT;
      document.getElementById('sel-font').value = defaultPresetFont;
      applyFontChoice(defaultPresetFont);
      Object.keys(visState).forEach(f => { if (!visState[f]) toggleVis(f); });
      coverImgState.path = null; coverImgState.visible = true; coverImgState.size = 25; coverImgState.right = 3;
      document.querySelectorAll('.source-thumb-btn').forEach(b => b.classList.remove('active'));
      applyCoverImg();
      const p = RATIO_PRESETS['1200/480'];
      document.getElementById('sld-title').max = p.titleMax;
      document.getElementById('sld-subtitle').max = p.subtitleMax;
      const set = (id, v) => document.getElementById(id).value = v;
      set('sld-label', p.labelSize); set('sld-title', p.titleSize); set('sld-subtitle', p.subtitleSize);
      set('sld-width', p.width); set('sld-title-lh', p.titleLH); set('sld-subtitle-lh', p.subtitleLH);
      set('sld-title-mt', p.titleMT); set('sld-title-mb', p.titleMB);
      syncAllSliders();
    }

    // ── Export ─────────────────────────────────────────────────────────────
    async function toDataURL(src) {
      const res = await fetch(src);
      if (!res.ok) throw new Error(`fetch ${src} returned ${res.status}`);
      const blob = await res.blob();
      if (!blob.type.startsWith('image/')) throw new Error(`fetch ${src} returned non-image: ${blob.type}`);
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(blob);
      });
    }

    async function captureEl(fn) {
      const el = document.getElementById('cover-main');
      const coverImg = document.getElementById('cover-img');
      const prev = el.style.maxWidth;
      el.style.maxWidth = 'none';
      const rect = el.getBoundingClientRect();
      // 按平台真实像素导出：从激活的比例按钮读 data-export-w，算缩放倍率
      const activeRatioBtn = document.querySelector('.ratio-btn.active');
      const exportW = activeRatioBtn ? +activeRatioBtn.dataset.exportW || 0 : 0;
      const ratio = exportW > 0 ? exportW / rect.width : 2;
      // fontEmbedCSS:'' prevents html-to-image from fetching @font-face URLs (local + CDN).
      // filter excludes any <img> that isn't a valid data:image/ URL, so html-to-image
      // never tries to load empty/remote img srcs (which would fire error events).
      const options = {
        pixelRatio: ratio,
        width: Math.round(rect.width),
        height: Math.round(rect.height),
        skipFonts: true,
        fontEmbedCSS: '',
        filter: (node) => {
          if (node.tagName === 'IMG') {
            const s = node.getAttribute('src');
            return !!(s && s.startsWith('data:image/'));
          }
          return true;
        },
      };

      // Pre-inline cover image as data URL so html-to-image doesn't fetch it.
      let origSrc = null;
      const srcAttr = coverImg.getAttribute('src');
      if (srcAttr && !srcAttr.startsWith('data:')) {
        try {
          origSrc = coverImg.src;
          coverImg.src = await toDataURL(coverImg.src);
        } catch (err) {
          console.warn('cover image inline failed, stripping src:', err.message);
          origSrc = coverImg.src;
          coverImg.removeAttribute('src');
        }
      } else if (srcAttr && srcAttr.startsWith('data:') && !srcAttr.startsWith('data:image/')) {
        origSrc = coverImg.src;
        coverImg.removeAttribute('src');
      }

      const fontsReady = document.fonts?.ready || Promise.resolve();
      return fontsReady
        .then(() => fn(el, options))
        .finally(() => {
          el.style.maxWidth = prev;
          if (origSrc !== null) coverImg.src = origSrc;
        });
    }

    function captureErrMsg(err) {
      if (err instanceof Event) {
        const t = err.target;
        const src = (t?.src || t?.href || t?.currentSrc || '').slice(0, 120);
        return `${err.type} on <${t?.tagName || '?'}>` + (src ? `\n${src}` : '');
      }
      return err?.message || String(err);
    }

    function exportPng() {
      captureEl(htmlToImage.toPng).then(url => {
        const a = document.createElement('a'); a.download = 'cover.png'; a.href = url; a.click();
      }).catch(err => { console.error('exportPng failed:', err); alert('截图失败：' + captureErrMsg(err)); });
    }

    function copyImage() {
      captureEl(htmlToImage.toBlob)
        .then(blob => navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]))
        .then(() => alert('已复制到剪贴板'))
        .catch(err => { console.error('copyImage failed:', err); alert('截图失败：' + captureErrMsg(err)); });
    }

    // ── 从 draft.md 读取封面元数据 ─────────────────────────────────────────
    async function loadDraftMeta() {
      try {
        const res = await fetch('./draft.md');
        if (!res.ok) return null;
        const text = await res.text();
        const get = (key) => {
          const m = text.match(new RegExp('^' + key + '：(.+)$', 'm'));
          return m ? m[1].trim() : null;
        };
        // 解析 ```json ... ``` 块中的 "changes" 对象
        let changes = null;
        const jsonBlock = text.match(/```json\s*([\s\S]*?)```/);
        if (jsonBlock) {
          try {
            const parsed = JSON.parse('{' + jsonBlock[1].trim() + '}');
            changes = parsed.changes || null;
          } catch (_) {}
        }
        return {
          label:      changes?.content?.label    || null,
          title:      changes?.content?.title    || null,
          subtitle:   changes?.content?.subtitle || null,
          author:     changes?.content?.author   || null,
          typography: changes?.typography        || null,
          background: changes?.background        || null,
          font:       changes?.font              || null,
          decoration: changes?.decoration        || null,
          visibility: changes?.visibility        || null,
          textColors: changes?.textColors        || null,
        };
      } catch (_) { return null; }
    }

    // ── Init ───────────────────────────────────────────────────────────────
    (async () => {
      const meta = await loadDraftMeta();

      initFontPicker();
      syncContent();
      syncAllSliders();
      initSourcePanel();
      initPresets();
      applyPreset(0, true);

      if (meta) {
        if (meta.label)    document.getElementById('inp-label').value    = meta.label;
        if (meta.title)    document.getElementById('inp-title').value    = meta.title;
        if (meta.subtitle) document.getElementById('inp-subtitle').value = meta.subtitle;
        if (meta.author)   document.getElementById('inp-author').value   = meta.author;

        if (meta.background) {
          const bg = meta.background;
          if (bg.type === 'scheme') {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('active', +b.dataset.scheme === bg.index));
            applyColorScheme(bg.index);
          } else if (bg.type === 'custom') {
            document.getElementById('inp-custom-bg').value = bg.value;
            const lbl = document.getElementById('btn-custom-bg');
            lbl.style.background = bg.value;
            lbl.classList.add('has-custom', 'active');
            document.querySelectorAll('.color-btn[data-scheme]').forEach(b => b.classList.remove('active'));
            applyCustomColor(bg.value);
          }
        }

        if (meta.font) {
          document.getElementById('sel-font').value = meta.font.id;
          applyFontChoice(meta.font.id);
        }

        if (meta.decoration) {
          document.querySelectorAll('.deco-btn').forEach(b => b.classList.toggle('active', b.dataset.deco === meta.decoration));
          applyDecoVis(meta.decoration);
          currentDeco = meta.decoration;
          buildDecorations(meta.decoration);
        }

        if (meta.visibility) {
          Object.entries(meta.visibility).forEach(([field, show]) => {
            if (visState[field] !== show) toggleVis(field);
          });
        }

        if (meta.textColors) {
          const colorMap = { label: 'clr-label', title: 'clr-title', subtitle: 'clr-subtitle', meta: 'clr-meta' };
          const elMap = { label: '.label', title: 'h1', subtitle: '.subtitle', meta: '.meta' };
          Object.entries(meta.textColors).forEach(([key, hex]) => {
            if (colorMap[key]) {
              document.getElementById(colorMap[key]).value = hex;
              const el = document.querySelector('#cover-main ' + elMap[key]);
              if (el) el.style.color = hex;
            }
          });
        }

        if (meta.typography) {
          const typoMap = {
            labelSize: 'sld-label', titleSize: 'sld-title', subtitleSize: 'sld-subtitle',
            contentWidth: 'sld-width', titleLineHeight: 'sld-title-lh', subtitleLineHeight: 'sld-subtitle-lh',
            titleMarginTop: 'sld-title-mt', titleMarginBottom: 'sld-title-mb',
          };
          Object.entries(meta.typography).forEach(([key, val]) => {
            const el = document.getElementById(typoMap[key]);
            if (el) el.value = val;
          });
          syncAllSliders();
        }

        syncContent();
      }
    })();
  </script>
