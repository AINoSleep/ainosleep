<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AINoSleep · Thread Composer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --accent: #1d9bf0;
    --accent-dim: #1d9bf020;
    --text: #e7e9ea;
    --text-dim: #71767b;
    --danger: #f4212e;
    --success: #00ba7c;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 16px; font-weight: 700; color: var(--text); }
  header span { color: var(--text-dim); font-size: 13px; }
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Left: editor */
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    gap: 8px;
  }
  .tweet-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    position: relative;
    transition: border-color 0.15s;
  }
  .tweet-card:focus-within { border-color: var(--accent); }
  .tweet-card .card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .tweet-num {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    min-width: 28px;
    text-align: center;
  }
  .tweet-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tweet-card textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    resize: none;
    min-height: 80px;
    font-family: inherit;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }
  .char-count {
    font-size: 12px;
    color: var(--text-dim);
  }
  .char-count.warn { color: #f59e0b; }
  .char-count.over { color: var(--danger); }
  .card-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }
  .connector {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 16px;
    color: var(--text-dim);
    font-size: 12px;
  }
  .connector::before, .connector::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .add-tweet-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent-dim);
    border: 1px dashed var(--accent);
    color: var(--accent);
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.15s;
    margin-top: 4px;
  }
  .add-tweet-btn:hover { background: var(--accent); color: #fff; }

  /* Right: preview & actions */
  .side-panel {
    width: 340px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .side-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }
  .side-section h3 {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .stat-card .val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-card .label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* Copy all */
  .copy-all-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    border: none;
    color: #fff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    transition: opacity 0.15s;
    margin-bottom: 8px;
  }
  .copy-all-btn:hover { opacity: 0.85; }

  /* Individual copy list */
  .copy-list { display: flex; flex-direction: column; gap: 6px; }
  .copy-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .copy-item:hover { border-color: var(--accent); }
  .copy-item .num {
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .copy-item .preview {
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .copy-item .copy-icon { font-size: 12px; color: var(--text-dim); flex-shrink: 0; }
  .copy-item.copied { border-color: var(--success); }
  .copy-item.copied .copy-icon { color: var(--success); }

  /* Import */
  .import-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
  }
  .import-area textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 12px;
    resize: none;
    height: 80px;
    font-family: inherit;
  }
  .import-area textarea::placeholder { color: var(--text-dim); }
  .import-btn {
    width: 100%;
    padding: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    margin-top: 6px;
    transition: border-color 0.15s;
  }
  .import-btn:hover { border-color: var(--accent); color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--success);
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <h1>AINoSleep · Thread Composer</h1>
  <span>X Thread 可视化编排工具</span>
</header>

<div class="main">
  <!-- Editor -->
  <div class="editor-panel" id="editorPanel">
    <!-- tweets rendered by JS -->
    <button class="add-tweet-btn" onclick="addTweet()">+ 添加新推文</button>
  </div>

  <!-- Side panel -->
  <div class="side-panel">
    <div class="side-section">
      <h3>统计</h3>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="val" id="statCount">1</div>
          <div class="label">条推文</div>
        </div>
        <div class="stat-card">
          <div class="val" id="statChars">0</div>
          <div class="label">总字符数</div>
        </div>
      </div>
    </div>

    <div class="side-section">
      <h3>复制发布</h3>
      <button class="copy-all-btn" onclick="copyAll()">📋 复制全部（换行分隔）</button>
      <div class="copy-list" id="copyList"></div>
    </div>

    <div class="side-section">
      <h3>从 AI 输出导入</h3>
      <div class="import-area">
        <textarea id="importInput" placeholder="粘贴 AINoSleep Factory 生成的 Thread 内容，自动按条拆分..."></textarea>
      </div>
      <button class="import-btn" onclick="importThread()">⬆ 解析并导入</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let tweets = [{ id: 1, text: '' }];
let nextId = 2;

const labels = ['钩子', '展开', '展开', '展开', '展开', '展开', '展开', '展开', '收尾 + CTA'];

function render() {
  const panel = document.getElementById('editorPanel');
  const addBtn = panel.querySelector('.add-tweet-btn');

  // Remove old cards
  panel.querySelectorAll('.tweet-card, .connector').forEach(el => el.remove());

  tweets.forEach((tweet, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'connector';
      conn.textContent = '↓ 回复';
      panel.insertBefore(conn, addBtn);
    }

    const card = document.createElement('div');
    card.className = 'tweet-card';
    const label = labels[Math.min(i, labels.length - 1)] || '展开';
    const count = tweet.text.length;
    const countClass = count > 260 ? 'over' : count > 220 ? 'warn' : '';

    card.innerHTML = `
      <div class="card-header">
        <span class="tweet-num">${i + 1}/${tweets.length}</span>
        <span class="tweet-label">${i === 0 ? '钩子' : i === tweets.length - 1 && tweets.length > 1 ? '收尾' : '展开'}</span>
      </div>
      <textarea placeholder="${i === 0 ? '第一条必须让人想继续读...' : i === tweets.length - 1 && tweets.length > 1 ? '收尾：一个问题或行动...' : '这条推文的核心论点...'}"
        oninput="updateTweet(${tweet.id}, this.value)"
        onkeydown="handleKey(event, ${tweet.id})"
      >${tweet.text}</textarea>
      <div class="card-footer">
        <span class="char-count ${countClass}">${count} / 280</span>
        <div class="card-actions">
          ${i > 0 ? `<button class="btn-icon" onclick="moveTweet(${tweet.id}, -1)" title="上移">↑</button>` : ''}
          ${i < tweets.length - 1 ? `<button class="btn-icon" onclick="moveTweet(${tweet.id}, 1)" title="下移">↓</button>` : ''}
          ${tweets.length > 1 ? `<button class="btn-icon danger" onclick="removeTweet(${tweet.id})" title="删除">✕</button>` : ''}
        </div>
      </div>
    `;
    panel.insertBefore(card, addBtn);
  });

  updateStats();
  renderCopyList();
}

function updateTweet(id, val) {
  const t = tweets.find(t => t.id === id);
  if (t) t.text = val;
  updateStats();
  renderCopyList();
  // Re-render just char count
  const cards = document.querySelectorAll('.tweet-card');
  tweets.forEach((tweet, i) => {
    const count = tweet.text.length;
    const cc = cards[i]?.querySelector('.char-count');
    if (cc) {
      cc.textContent = `${count} / 280`;
      cc.className = 'char-count ' + (count > 260 ? 'over' : count > 220 ? 'warn' : '');
    }
  });
}

function handleKey(e, id) {
  if (e.key === 'Enter' && e.metaKey) { addTweet(); }
}

function addTweet() {
  tweets.push({ id: nextId++, text: '' });
  render();
  // Focus last textarea
  setTimeout(() => {
    const areas = document.querySelectorAll('.tweet-card textarea');
    areas[areas.length - 1]?.focus();
  }, 50);
}

function removeTweet(id) {
  if (tweets.length <= 1) return;
  tweets = tweets.filter(t => t.id !== id);
  render();
}

function moveTweet(id, dir) {
  const i = tweets.findIndex(t => t.id === id);
  const ni = i + dir;
  if (ni < 0 || ni >= tweets.length) return;
  [tweets[i], tweets[ni]] = [tweets[ni], tweets[i]];
  render();
}

function updateStats() {
  document.getElementById('statCount').textContent = tweets.length;
  document.getElementById('statChars').textContent = tweets.reduce((s, t) => s + t.text.length, 0);
}

function renderCopyList() {
  const list = document.getElementById('copyList');
  list.innerHTML = tweets.map((t, i) => `
    <div class="copy-item" id="ci-${t.id}" onclick="copyTweet(${t.id})">
      <span class="num">${i + 1}</span>
      <span class="preview">${t.text || '（空）'}</span>
      <span class="copy-icon">⎘</span>
    </div>
  `).join('');
}

function copyTweet(id) {
  const t = tweets.find(t => t.id === id);
  if (!t || !t.text.trim()) return;
  navigator.clipboard.writeText(t.text).then(() => {
    const el = document.getElementById(`ci-${id}`);
    if (el) {
      el.classList.add('copied');
      el.querySelector('.copy-icon').textContent = '✓';
      setTimeout(() => {
        el.classList.remove('copied');
        el.querySelector('.copy-icon').textContent = '⎘';
      }, 1500);
    }
    showToast(`第 ${tweets.findIndex(t=>t.id===id)+1} 条已复制`);
  });
}

function copyAll() {
  const text = tweets.map((t, i) => `[${i+1}/${tweets.length}]\n${t.text}`).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('全部内容已复制'));
}

function importThread() {
  let raw = document.getElementById('importInput').value.trim();
  if (!raw) return;

  // 去掉 YAML frontmatter（--- 开头的头部块）
  raw = raw.replace(/^---[\s\S]*?---\n?/, '');

  // 按 [N/M] 拆分
  let parts = raw.split(/\n?\[\d+\/\d+\]\n?/g).filter(s => s.trim());

  // 回退：按双换行拆分
  if (parts.length <= 1) {
    parts = raw.split(/\n\n+/).filter(s => s.trim());
  }

  if (parts.length === 0) return;

  // 每条去掉首尾的 --- 分隔线和多余空行
  tweets = parts.map(p => ({
    id: nextId++,
    text: p.replace(/^\s*---\s*$/gm, '').trim()
  }));

  document.getElementById('importInput').value = '';
  render();
  showToast(`已导入 ${tweets.length} 条推文`);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Init
render();
</script>
</body>
</html>
