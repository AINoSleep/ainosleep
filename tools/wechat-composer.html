<script>
// 公众号正文样式（全部内联，因为公众号会剥离 class 和 style 标签）
var S = {
  title:   'font-size:21px;font-weight:700;color:#222222;line-height:1.5;margin:0 0 24px;letter-spacing:0.5px;',
  h2:      'font-size:17px;font-weight:700;color:#222222;line-height:1.6;margin:34px 0 16px;',
  p:       'font-size:16px;line-height:1.75;color:#3f3f3f;margin:0 0 22px;letter-spacing:0.5px;',
  strong:  'font-weight:700;color:#222222;',
  mark:    'background-color:#fff1a8;padding:1px 4px;border-radius:2px;',
  hr:      'text-align:center;color:#cfcfcf;font-size:14px;letter-spacing:6px;margin:30px 0;',
  quote:   'background:#f7f7f7;border-left:3px solid #d6d6d6;padding:16px 18px;color:#666666;font-size:15px;line-height:1.75;border-radius:4px;margin:24px 0;'
};

function inline(text){
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="'+S.strong+'">$1</strong>');
  text = text.replace(/==(.+?)==/g, '<span style="'+S.mark+'">$1</span>');
  return text;
}

function build(){
  var raw = document.getElementById('md').value;
  var lines = raw.split('\n');
  var html = '';
  var quoteBuf = [];

  function flushQuote(){
    if(quoteBuf.length){
      html += '<section style="'+S.quote+'">' +
        quoteBuf.map(function(l){ return inline(l); }).join('<br>') +
        '</section>';
      quoteBuf = [];
    }
  }

  for(var i=0;i<lines.length;i++){
    var line = lines[i].trim();
    if(line.indexOf('>')===0){ quoteBuf.push(line.replace(/^>\s?/,'')); continue; }
    flushQuote();
    if(line===''){ continue; }
    if(line==='---'){ html += '<p style="'+S.hr+'">· · ·</p>'; continue; }
    if(line.indexOf('## ')===0){ html += '<h2 style="'+S.h2+'">'+inline(line.slice(3))+'</h2>'; continue; }
    if(line.indexOf('# ')===0){ html += '<p style="'+S.title+'">'+inline(line.slice(2))+'</p>'; continue; }
    html += '<p style="'+S.p+'">'+inline(line)+'</p>';
  }
  flushQuote();
  return html;
}

function render(){
  document.getElementById('preview').innerHTML = build();
}

function copyArticle(){
  var el = document.getElementById('preview');
  // 移动端复制前自动切到预览，保证内容可见可选中
  if(window.innerWidth <= 820){ setView('preview'); }
  var range = document.createRange();
  range.selectNodeContents(el);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  var ok = false;
  try { ok = document.execCommand('copy'); } catch(e){ ok = false; }
  if(ok){
    var h = document.getElementById('hint');
    h.classList.add('show');
    setTimeout(function(){ h.classList.remove('show'); }, 2200);
    sel.removeAllRanges();
  } else {
    // 兜底：保留选区，提示长按复制
    alert('请长按选中的预览内容，选择“拷贝”');
  }
}

function clearAll(){
  document.getElementById('md').value = '';
  render();
}

function setView(v){
  document.body.className = v === 'preview' ? 'view-preview' : 'view-edit';
  document.getElementById('tabEdit').classList.toggle('active', v==='edit');
  document.getElementById('tabPreview').classList.toggle('active', v==='preview');
}

var SAMPLE = `# 失业后最不该做的，就是疯狂投简历

失业的第一个星期，我投了 ==47 份简历==。

每天睁眼第一件事，刷招聘软件。把简历改了又改，头像换成正装，描述写得像个人物。投出去，等。

回复很少。约面试的更少。

那段时间我算过一笔账。备用金扣掉房租和吃饭，能撑三个月多一点。这个数字每天在脑子里转，越转越慌。

慌的时候人会做一件事，就是更用力地做那件让你慌的事。我投得更猛了，一天三四十份。

直到有天晚上，我投完最后一份，关掉电脑，突然想明白一件事。

我投的这些岗位，绝大多数会被 AI 顶掉。我在拼命争一张正在缩水的船票。

那一晚我没睡好。第二天我做了一个决定，先停下来，不投了。

**这个决定听起来很蠢，没收入还不找工作。**

但我换了个问法。

我不再问谁能雇我，开始问我能直接帮谁解决问题，让对方愿意付钱。

这两个问法，差了一个世界。

第一个，主动权在别人手里，你是被挑的。第二个，主动权在你手里，你是去解决问题的。

我手里有什么，一台电脑，会用 AI，仅此而已。

我开始翻各种群，看有没有人发需求。不是看招聘，是看谁在抱怨什么事麻烦、谁在问有没有人能帮忙做某件事。

第三天，我看到一个做电商的，在群里问有没有人能帮他批量写产品文案，几百个 SKU，外包报价太贵，周期还长。

我私聊他。没说我失业，没说我多需要这单。我只说，这个我能做，两天能出初稿，先免费写 5 条看效果，不行不要钱。

他将信将疑发了 5 个产品信息给我。

我用 AI 跑了一套流程。不是直接丢给 AI 让它写，是先拆产品卖点，建一套提示词，让 AI 按固定结构出稿，我再逐条改成人话。两个小时，5 条交过去。

他回了四个字，比外包写得好。

这一单，我收了 ==1800==。

**钱不多，但那一刻的意义，比 1800 大得多。**

这是我第一次确认，失业之后，不靠别人雇我，也能凭自己赚到钱。这件事验证过一次，整个人的状态就不一样了。

后来我复盘这一单，想清楚了三件事，写给现在和我一样卡住的人。

---

## 第一，失业后最该先验证的不是能力，是你能不能完成一次成交

很多人失业后疯狂学习，报课，囤教程。学是对的，但顺序错了。先证明你能把一个东西卖出去、收到钱，哪怕很小，这个正反馈比学十门课都管用。

---

## 第二，AI 不是核心，是放大器

客户付钱不是因为我用了 AI。他付钱是因为问题被解决了，又快又便宜。AI 让我一个人，扛起原来需要一个小团队、还要等两周的活。值钱的从来不是工具，是你用工具解决了一个有人愿意付钱的真实问题。

---

## 第三，别一开始就想做大

我没想着开公司、做平台、招人。我只做了一件最小的事，帮一个人写好他的文案。先有成交，再谈别的。摊子铺太大，是大多数人还没赚到钱就放弃的原因。

现在距离那一单过去几个月了。我没回去上班。不是已经赚了多少钱，是我找到了一条自己能走、越走越宽的路。

如果你也刚失业，正在疯狂投简历，我不是劝你别投。

我是想说，在投简历之外，给自己留一条不依赖别人雇你的路。这条路一开始很窄，但它是你自己的。

那张正在缩水的船票，可以不抢了。

> 我把这几个月用的那套 AI 接单提示词和找需求的方法，整理成了一份文档。需要的话，在公众号后台回复 自救，我发给你。
> 不收钱。我也是从那个最慌的阶段走过来的。`;

function loadSample(){
  document.getElementById('md').value = SAMPLE;
  render();
}

loadSample();
